stage: "3.5"
name: "Prompt-space Hardening for Broader Coordination Operator Family Coverage"
created_by: "Codex"
created_date: "2026-06-20"

purpose:
  summary: "Use a hardened train-only prompt to force broader coordination family coverage before any evolution or performance evaluation."
  generator: "loco.llm.prompt_space_hardening"
  cli_entrypoint: "scripts/stage3/run_stage3_5_prompt_space_hardening.py"

input:
  env_file: ".env"
  split: "train"
  shared_variables:
    - 5
    - 6
  batch_count: 3
  candidates_per_batch: 4

required_coverage:
  api_call_count: 3
  raw_candidate_count: 12
  accepted_count: 8
  quality_pass_count: 8
  unique_kind_sequence_count: 5
  operator_family_count: 5
  max_dominant_ratio: 0.5
  must_include:
    - "projection"
    - "dampening"
    - "reweighting"
    - "repair"
    - "best_reward_select"

artifacts:
  output_dir: "artifacts/candidates/stage3_5"
  merged_raw_llm_output: "artifacts/candidates/stage3_5/merged_raw_llm_output.json"
  accepted_log: "artifacts/candidates/stage3_5/accepted_candidates.jsonl"
  rejected_log: "artifacts/candidates/stage3_5/rejected_candidates.jsonl"
  replay_report: "artifacts/candidates/stage3_5/replay_report.json"
  quality_filter_report: "artifacts/candidates/stage3_5/quality_filter_report.json"
  static_diversity_audit: "artifacts/candidates/stage3_5/static_diversity_audit.json"
  coverage_gate_report: "artifacts/candidates/stage3_5/coverage_gate_report.json"
  summary: "artifacts/candidates/stage3_5/stage3_5_summary.json"

current_result:
  status: "PASS"
  api_call_count: 3
  raw_candidate_count: 12
  accepted_count: 12
  quality_pass_count: 12
  unique_kind_sequence_count: 8
  operator_family_count: 8
  dominant_kind_sequence: "projection->dampening"
  dominant_kind_sequence_count: 3
  dominant_ratio: 0.25
  must_include_projection: true
  must_include_dampening: true
  must_include_reweighting: true
  must_include_repair: true
  must_include_best_reward_select: true

forbidden_scope:
  - "no evolution run"
  - "no objective evaluation"
  - "no optimizer generation"
  - "no BaseOpt modification"
  - "no scheduler/controller generation"
  - "no optimizer selection"
  - "no benchmark objective rewrite"
  - "no validation feedback"
  - "no test feedback"
  - "no performance claim"
