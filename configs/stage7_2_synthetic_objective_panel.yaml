  - "configs/stage7_1_objective_loop_pilot.yaml"
  - "artifacts/selected/stage5_1/selected_operator.json"
  - "artifacts/selected/stage5_1/selected_operator_ast.json"

panel_setup:
  objective_name: "synthetic_sphere"
  grouping_mode: "oracle grouping"
  dimensions: [500, 1000]
  seeds: [0]
  objective_step_count_per_method_per_panel: 3
  selected_operator_target_variable: 6
  fixed_baseopt: "deterministic proposal generator"
  same_budget_across_methods: true

synthetic_panels:
  - "synthetic_no_overlap_panel"
  - "synthetic_low_overlap_panel"
  - "synthetic_conflicting_overlap_panel"
  - "synthetic_high_overlap_panel"

method_set:
  - "identity_no_coord"
  - "simple_consensus"
  - "weighted_consensus"
  - "best_reward_select"
  - "selected_loco_operator"

artifacts:
  output_dir: "artifacts/objective_eval/stage7_2"
  objective_trace: "artifacts/objective_eval/stage7_2/objective_trace.jsonl"
  panel_summary: "artifacts/objective_eval/stage7_2/panel_summary.json"
  method_summary: "artifacts/objective_eval/stage7_2/method_summary.json"
  fe_ledger: "artifacts/objective_eval/stage7_2/fe_ledger.json"
  runtime_boundary: "artifacts/objective_eval/stage7_2/runtime_boundary.json"
  panel_report: "artifacts/objective_eval/stage7_2/panel_report.json"

fe_accounting:
  identity: "FE_total = FE_grouping + FE_proposal + FE_coordination_extra + FE_repair + FE_global_objective"
  expected_total:
    FE_grouping: 0
    FE_proposal: 120
    FE_coordination_extra: 0
    FE_repair: 0
    FE_global_objective: 120
    FE_total: 240
  same_budget_across_methods: true
  cross_method_evaluations_shared: false

boundary_notes:
  no_overlap_policy: "Do not fabricate shared-variable conflict states; selected_loco_operator records zero coordination applications on no-overlap rows."
  overlap_policy: "Variables shared by overlapping groups include the frozen selected operator target variable 6."
  allowed_claim: "Stage 7.2 shows the Stage 7.1 objective loop scales to the locked synthetic panel types under same FE budget."
  forbidden_claim: "Stage 7.2 is not a final objective-value performance claim and not a SOTA claim."

forbidden_scope:
  - "no LLM call"
  - "no new candidate generation"
  - "no selected-operator revision"
  - "no evolution/search run"
  - "no test-feedback tuning"
  - "no BaseOpt modification"
  - "no optimizer/controller/scheduler generation"
  - "not a SOTA claim"
  - "not a final objective-value performance claim"

