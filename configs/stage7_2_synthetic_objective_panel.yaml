stage: "7.2"
name: "Synthetic Large-Scale Objective Panel"
created_by: "Codex"
created_date: "2026-06-21"

purpose:
  summary: "Expand the Stage 7.1 minimal LOCO-CC objective loop to the Stage 7.0 locked synthetic panel types under same FE budget."
  runner: "loco.coordination.synthetic_objective_panel"
  cli_entrypoint: "scripts/stage7/run_stage7_2_synthetic_objective_panel.py"
  panel_scope: "synthetic_large_scale_objective_panel"
  objective_panel_executed: true
  objective_benchmark_run: false
  not_final_performance_claim: true
  not_sota_claim: true

legal_inputs:
