stage: "8.11"
name: "Policy Generalization Beyond Best Simple Baseline"
created_by: "Codex"
created_date: "2026-06-22"

purpose:
  summary: "Execute a generalized coordination policy inside the locked objective-level LOCO-CC panel and test whether it beats the best simple baseline."
  runner: "loco.coordination.policy_generalization_objective_rerun"
  cli_entrypoint: "scripts/stage8/run_stage8_11_policy_generalization.py"
  objective_loop_rerun: true
  generalized_policy_executed: true
  not_performance_claim: true
  not_sota_claim: true

legal_inputs:
  stage8_10_route_decision: "artifacts/objective_eval/stage8_10/route_decision.json"
  stage8_10_requirements: "artifacts/objective_eval/stage8_10/policy_generalization_requirements.json"
  stage8_3_selection_decision: "artifacts/selection_audit/stage8_3/objective_utility_selection_decision.json"
  frozen_stage5_operator: "artifacts/selected/stage5_1/selected_operator.json"
  frozen_stage5_ast: "artifacts/selected/stage5_1/selected_operator_ast.json"
  stage8_7_policy_report: "artifacts/objective_eval/stage8_7/conditional_policy_report.json"
  stage8_7_case_policy_table: "artifacts/objective_eval/stage8_7/case_policy_table.jsonl"
  source_stage: "8.10"

policy:
  name: "regime_safe_adaptive_shrinkage_v1"
  method_name: "stage8_11_generalized_policy"
  rule: "use a safe base branch, then apply conflict-aware adaptive shrinkage when the shrinkage candidate is strictly safer than the base branch"
  required_capabilities:
    - "adaptive_robust_aggregation"
    - "conflict_aware_shrinkage"
    - "outlier_proposal_rejection"
    - "reliability_calibrated_consensus"
    - "topology_aware_shared_variable_update"

panel:
  dimensions: [500, 1000, 2000]
  seeds: [0, 1, 2]
  synthetic_panels:
    - "synthetic_low_overlap_panel"
    - "synthetic_medium_overlap_panel"
    - "synthetic_high_overlap_panel"
    - "synthetic_conflicting_overlap_panel"
  objective_steps_per_method_per_case: 3
  methods:
    - "identity_no_coord"
    - "simple_consensus"
    - "weighted_consensus"
    - "best_reward_select"
    - "frozen_stage5_selected_operator"
    - "stage8_3_selected_operator"
    - "stage8_11_generalized_policy"

expected_findings:
  generalized_vs_frozen_stage5: "positive wins expected"
  generalized_vs_best_baseline: "beat best simple baseline with zero losses"
  minimum_vs_best_baseline_win_count: 27
  maximum_vs_best_baseline_loss_count: 0
  stage8_10_policy_generalization_required: true

fe_accounting:
  objective_loop_executed: true
  new_objective_evaluation_used: true
  all_extra_fe_counted: true

forbidden_scope:
  - "no LLM call"
  - "no new candidate generation"
  - "no selected-operator revision"
  - "no evolution/search"
  - "no validation feedback"
  - "no test feedback"
  - "no BaseOpt modification"
  - "no optimizer/controller/scheduler generation"
  - "not a final objective-value performance claim"
  - "not a SOTA claim"
